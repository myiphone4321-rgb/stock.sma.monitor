<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SMA Monitor — US &amp; Tel Aviv</title>
<link rel="stylesheet" href="style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<header class="site-header">
  <h1 class="site-title">SMA Monitor<span class="dot">.</span></h1>
  <div class="site-meta">
    <div><strong>Last updated:</strong> <span id="updated-at">—</span></div>
    <div><a href="https://github.com/myiphone4321-rgb/stock.sma.monitor" target="_blank" rel="noopener">view source</a></div>
  </div>
</header>

<div class="tape" aria-label="Stocks that crossed an SMA today">
  <div class="tape-track" id="tape-track">
    <!-- populated by app.js -->
  </div>
</div>

<main>

  <section class="market-section">
    <div class="market-heading">
      <h2>US Market</h2>
      <span class="count" id="us-count">0</span>
    </div>
    <div class="stock-list" id="us-list" aria-label="US watchlist"></div>
  </section>

  <section class="market-section">
    <div class="market-heading">
      <h2>Tel Aviv Market</h2>
      <span class="count" id="il-count">0</span>
    </div>
    <div class="stock-list" id="il-list" aria-label="Tel Aviv watchlist"></div>
  </section>

</main>

<footer class="site-footer">
  Price data via Yahoo Finance, refreshed automatically twice each trading day.
  Edit <code>docs/data/watchlist.json</code> in the repo to change which tickers are tracked.
</footer>

<!-- Chart modal -->
<div class="modal-overlay" id="modal-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <div>
        <h3 id="modal-title">—</h3>
        <div class="modal-sub" id="modal-sub">—</div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>

    <div class="modal-stats">
      <div class="modal-stat">
        <span class="label">Price</span>
        <span class="value" id="stat-price">—</span>
      </div>
      <div class="modal-stat">
        <span class="label">SMA20</span>
        <span class="value" id="stat-sma20">—</span>
      </div>
      <div class="modal-stat">
        <span class="label">SMA50</span>
        <span class="value" id="stat-sma50">—</span>
      </div>
    </div>

    <div class="chart-wrap">
      <canvas id="price-chart" height="260"></canvas>
    </div>
    <div class="legend-row">
      <span><span class="swatch" style="background:#e8e2d0"></span>Close</span>
      <span><span class="swatch" style="background:#2bb3a3"></span>SMA20</span>
      <span><span class="swatch" style="background:#c9a227"></span>SMA50</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
