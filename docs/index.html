<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SMA Monitor — US &amp; Tel Aviv</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Error banner: shown only when one or more tickers failed to fetch -->
<div class="error-banner" id="error-banner" hidden>
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
    <circle cx="8" cy="8" r="7.25" stroke="white" stroke-width="1.5"/>
    <path d="M8 4.5v4M8 10.5v1" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <span id="error-text">Error fetching data</span>
</div>

<header class="site-header">
  <h1 class="site-title">SMA Monitor<span class="dot">.</span></h1>
  <div class="site-meta">
    <strong>Last updated:</strong> <span id="updated-at">—</span>
  </div>
</header>

<!-- Today's crosses scrollable strip -->
<div class="tape" aria-label="Stocks that crossed an SMA recently">
  <div class="tape-track" id="tape-track"><!-- populated by app.js --></div>
</div>

<main>

  <section class="market-section">
    <div class="market-heading">
      <h2>US Market</h2>
      <span class="count" id="us-count">0</span>
    </div>
    <div id="us-list"></div>
  </section>

  <section class="market-section">
    <div class="market-heading">
      <h2>Tel Aviv Market</h2>
      <span class="count" id="il-count">0</span>
    </div>
    <div id="il-list"></div>
  </section>

</main>

<footer class="site-footer">
  Refreshed automatically twice each trading day.
  Edit <code>docs/data/watchlist.json</code> to change tracked tickers.
</footer>

<!-- Chart modal -->
<div class="modal-overlay" id="modal-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <h3 id="modal-title">—</h3>
        <div class="modal-sub" id="modal-sub">—</div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>

    <div class="modal-stats">
      <div class="modal-stat">
        <span class="label">Price</span>
        <span class="value" id="stat-price">—</span>
      </div>
      <div class="modal-stat">
        <span class="label">SMA 20</span>
        <span class="value" id="stat-sma20">—</span>
      </div>
      <div class="modal-stat">
        <span class="label">SMA 50</span>
        <span class="value" id="stat-sma50">—</span>
      </div>
    </div>

    <div class="chart-wrap">
      <canvas id="price-chart" height="240"></canvas>
    </div>
    <div class="legend-row">
      <span><span class="swatch" style="background:#0a84ff"></span>Close</span>
      <span><span class="swatch" style="background:#34c759"></span>SMA 20</span>
      <span><span class="swatch" style="background:#ff9500"></span>SMA 50</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
