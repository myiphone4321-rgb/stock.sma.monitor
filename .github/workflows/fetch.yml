name: Fetch stock data

# Runs twice on trading days, timed to catch each market shortly after its
# close, then commits the updated JSON data straight back into the repo.
# Cron is always UTC, so these times are approximate around DST changes —
# that's fine since we only need the day's closing price, not the exact tick.
on:
  schedule:
    # ~16:00 UTC, Sun-Thu -> shortly after the Tel Aviv Stock Exchange closes
    - cron: "0 16 * * 0-4"
    # ~21:30 UTC, Mon-Fri -> shortly after the US market closes
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: fetch-stock-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.1.7

      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data and update SMA signals
        run: python scripts/fetch_and_update.py

      - name: Commit and push if data changed
        run: |
          git config user.name "sma-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No data changes, nothing to commit."
          else
            git commit -m "Update stock data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
